<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADV-HOCO Pro Forecaster</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #1a1a1a; color: #eee; overflow: hidden; }
        #sidebar { width: 420px; padding: 20px; background: #252525; border-right: 1px solid #444; overflow-y: auto; z-index: 10; box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5); }
        #map { flex-grow: 1; height: 100%; }
        
        /* Auth Overlay */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,10,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #252525; padding: 30px; border-radius: 12px; border: 1px solid #444; width: 320px; text-align: center; }

        /* UI Components */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75em; font-weight: bold; margin-bottom: 5px; color: #888; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #444; border-radius: 4px; background: #333; color: white; box-sizing: border-box; font-size: 0.9em; }
        
        .control-panel { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 15px; }
        
        /* Calendar Explorer */
        .explorer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }

        /* Scenarios & Weights */
        #exclusiveSection { display: none; margin-top: 15px; padding: 10px; border-top: 2px dashed #444; }
        .scenario-builder { background: #1e1e1e; padding: 12px; border-radius: 6px; border: 1px solid #3498db; margin-bottom: 15px; }
        .scenario-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        .scenario-chip { background: #3498db; color: white; padding: 4px 10px; border-radius: 15px; font-size: 0.7em; display: flex; align-items: center; }
        .scenario-chip span { margin-left: 8px; cursor: pointer; font-weight: bold; }
        
        .weight-grid { max-height: 120px; overflow-y: auto; border: 1px solid #444; padding: 8px; background: #1a1a1a; }
        .weight-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 0.75em; border-bottom: 1px solid #333; padding-bottom: 3px; }
        .weight-item input { width: 50px; padding: 3px; text-align: center; }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .checkbox-item { display: flex; align-items: center; font-size: 0.75em; background: #333; padding: 5px 10px; border-radius: 4px; border: 1px solid #444; }
        .checkbox-item input { width: auto; margin-right: 6px; }
        
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn-add { background: #27ae60; margin-top: 8px; padding: 6px; font-size: 0.8em; }
        button:hover { filter: brightness(1.1); }
        #logoutBtn { background: transparent; border: 1px solid #c0392b; color: #c0392b; margin-top: 20px; padding: 8px; }

        .status-box { margin-top: 15px; padding: 10px; border-radius: 4px; font-size: 0.8em; display: none; text-align: center; }
        .pending { background: #f39c1222; border: 1px solid #f39c12; color: #f39c12; }
        .completed { background: #27ae6022; border: 1px solid #27ae60; color: #27ae60; }

        .legend-bar { height: 10px; width: 100%; background: linear-gradient(to right, #66c2a4, #fff200, #ff7f27, #ec1c24, #b83dba); border-radius: 5px; margin: 8px 0; }
        .role-badge { font-size: 0.6em; padding: 2px 6px; border-radius: 10px; background: #3498db; vertical-align: middle; margin-left: 5px; }
    </style>
</head>

<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h2 style="color:#3498db; margin-top:0;">HOCO Access</h2>
            <input type="email" id="emailIn" placeholder="Email" style="margin-bottom:10px;">
            <input type="password" id="passIn" placeholder="Password" style="margin-bottom:15px;">
            <button id="loginBtn">Sign In</button>
            <p id="authError" style="color:#e74c3c; font-size:0.8em; margin-top:10px;"></p>
        </div>
    </div>

    <div id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0; color: #3498db; font-size: 1.4em;">ADV-HOCO <span id="roleBadge" class="role-badge">GUEST</span></h2>
        </div>
        
        <div class="control-panel">
            <label>Run Explorer (Calendar)</label>
            <div class="explorer-grid">
                <input type="date" id="calendarFilter">
                <select id="idSelector"><option value="">Select Date...</option></select>
            </div>
            <div class="legend-bar"></div>
        </div>

        <form id="hocoForm">
            <div class="form-group">
                <label>1. Region & Window</label>
                <select id="regionSelect" style="margin-bottom: 8px;">
                    <option value="UK">United Kingdom</option>
                    <option value="England">England</option>
                </select>
                <input type="text" id="startTime" placeholder="Start: DD/MM/YYYY HH:MM" required>
                <input type="text" id="endTime" placeholder="End: DD/MM/YYYY HH:MM" required style="margin-top:8px;">
                <p id="limitNote" style="font-size:0.7em; color:#888; margin-top:5px; font-style:italic;"></p>
            </div>

            <div id="exclusiveSection">
                <div class="scenario-builder">
                    <label>2. Custom Model Runs</label>
                    <select id="modelSelect" style="margin-bottom: 5px;"></select>
                    <select id="runSelect"></select>
                    <button type="button" class="btn-add" id="addScenarioBtn">+ Add Run</button>
                    <div class="scenario-list" id="scenarioList"></div>
                </div>

                <label>3. Model Weights</label>
                <div id="weightsContainer" class="weight-grid"></div>
            </div>

            <label>4. Parameters</label>
            <div class="checkbox-group">
                <div class="checkbox-item"><input type="checkbox" name="weather" value="lightning" checked> Lightning</div>
                <div class="checkbox-item"><input type="checkbox" name="weather" value="tornado"> Tornado</div>
                <div class="checkbox-item"><input type="checkbox" name="weather" value="snow"> Snow</div>
            </div>

            <button type="submit" id="submitBtn">Generate Ensemble</button>
        </form>
        
        <div id="statusBox" class="status-box"></div>
        <button id="logoutBtn">Logout</button>
    </div>

    <div id="map"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, getDoc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        // --- 1. FRONT-END LOGIN FIREBASE (Auth Only) ---
        const authConfig = {
            apiKey: "AIzaSyBjMyJIMp1F_zktvOR1GsGPCgEvmx_Qmdg",
            authDomain: "hoco-frontend.firebaseapp.com",
            projectId: "hoco-frontend",
            storageBucket: "hoco-frontend.firebasestorage.app",
            messagingSenderId: "276113939915",
            appId: "1:276113939915:web:f11104760b00ef2074aa4e",
            measurementId: "G-2E689K3KBD"
            };

        // --- 2. BACKEND FIREBASE (Database & Functions) ---
        const backendConfig = {
            apiKey: "AIzaSyA8IYTApDl8vhZENPJXIw48rR_SUhfFPVQ",
            authDomain: "hoco-3b23e.firebaseapp.com",
            projectId: "hoco-3b23e",
            storageBucket: "hoco-3b23e.firebasestorage.app",
            messagingSenderId: "409513272369",
            appId: "1:409513272369:web:a857d9b039d53710f8a110"
        };

        // Initialize Apps with Unique Names
        const authApp = initializeApp(authConfig, "authApp");
        const backendApp = initializeApp(backendConfig, "backendApp");

        // Map Services to the Correct App
        const auth = getAuth(authApp);
        const db = getFirestore(backendApp);
        const functions = getFunctions(backendApp, "us-central1");
        const triggerHocoRun = httpsCallable(functions, 'triggerHocoRun');

        // --- Role Config ---
        let userRole = 'normal'; 
        const ROLES = {
            NORMAL: { maxRange: 24, lookAhead: 72, customModels: false },
            EXCLUSIVE: { maxRange: 72, lookAhead: 72, customModels: true },
            DEVELOPER: { maxRange: 999, lookAhead: 999, customModels: true }
        };

        const defaultWeights = { 'rpdid2': 0.8, 'swisseu': 1.1, 'ez': 1.1, 'swissnow': 0.9, 'frahd': 0.8, 'hardmi': 1.0, 'ukmo2km': 0.9, 'deuhd': 1.0 };
        const models = { frahd: { name: "FRAHD", freq: 3 }, rpdid2: { name: "RPDID2", freq: 3 }, hardmi: { name: "HARDMI", freq: 3 }, swisseu: { name: "SWISSEU", freq: 3 }, swissnow: { name: "SWISSNOW", freq: 1 }, ez: { name: "EZ", freq: 12 }, ukmo2km: { name: "UKMO 2KM", freq: 3} };

        // --- Map Init ---
        mapboxgl.accessToken = 'pk.eyJ1IjoibWV0ZW9ncm91cC1tYXBib3giLCJhIjoiY2pudWJyMWVhMDQ0bjNxdXFsNWJ5M2ZtbSJ9.ANOKYyv5s0VFVbnesnGGUQ';
        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [-1.5, 52.5], zoom: 5.5 });

        // --- Authentication Logic ---
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailIn').value;
            const pass = document.getElementById('passIn').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) { document.getElementById('authError').innerText = err.message; }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Roles are stored in the BACKEND database, keyed by the Auth UID
                const userDoc = await getDoc(doc(db, "users", user.uid));
                userRole = userDoc.exists() ? userDoc.data().role : 'normal';
                setupUIForRole();
                document.getElementById('authOverlay').style.display = 'none';
                initRunExplorer();
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
            }
        });

        function setupUIForRole() {
            const roleKey = userRole.toUpperCase();
            const config = ROLES[roleKey];
            document.getElementById('roleBadge').innerText = roleKey;
            document.getElementById('exclusiveSection').style.display = config.customModels ? 'block' : 'none';
            document.getElementById('limitNote').innerText = roleKey === 'DEVELOPER' ? 'Unlimited access enabled.' : `Max Range: ${config.maxRange}h | Look-ahead: ${config.lookAhead}h`;
        }

        // --- Calendar Explorer Logic ---
        let cachedRuns = [];
        function initRunExplorer() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('calendarFilter').value = today;

            onSnapshot(query(collection(db, "hoco_requests"), orderBy("createdAt", "desc"), limit(200)), (snap) => {
                cachedRuns = [];
                snap.forEach(d => cachedRuns.push({ id: d.id, ...d.data() }));
                refreshRunList(document.getElementById('calendarFilter').value);
            });
        }

        document.getElementById('calendarFilter').addEventListener('change', (e) => refreshRunList(e.target.value));

        function refreshRunList(dateStr) {
            const s = document.getElementById('idSelector');
            s.innerHTML = '<option value="">-- Select Run --</option>';
            
            const filtered = cachedRuns.filter(r => {
                const runDate = r.createdAt?.toDate().toISOString().split('T')[0];
                return runDate === dateStr;
            });

            if (filtered.length === 0) {
                s.innerHTML = '<option value="">No runs on this date</option>';
                return;
            }

            filtered.forEach(data => {
                const opt = document.createElement('option');
                opt.value = data.id;
                const icon = data.type === 'automated' ? '🤖' : '👤';
                opt.textContent = `${icon} [${data.status.toUpperCase()}] ${data.startTime}`;
                if (data.status === 'completed') opt.style.color = '#27ae60';
                s.appendChild(opt);
            });
        }

        // --- Time Validation ---
        function validateRequest(startStr, endStr) {
            if (userRole === 'developer') return true;
            
            const start = parseDate(startStr);
            const end = parseDate(endStr);
            const now = new Date();
            const diffHours = (end - start) / (1000 * 60 * 60);
            const aheadHours = (start - now) / (1000 * 60 * 60);

            const config = ROLES[userRole.toUpperCase()];

            if (start < now && userRole !== 'developer') { alert("Historical runs are developer-only."); return false; }
            if (aheadHours > config.lookAhead) { alert(`Your plan only allows looking ${config.lookAhead}h ahead.`); return false; }
            if (diffHours > config.maxRange || diffHours <= 0) { alert(`Invalid range. Max allowed: ${config.maxRange}h`); return false; }
            
            return true;
        }

        function parseDate(s) {
            const p = s.match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/);
            return new Date(p[3], p[2]-1, p[1], p[4], p[5]);
        }

        // --- Model Selection Logic ---
        const weightsContainer = document.getElementById('weightsContainer');
        const modelSelect = document.getElementById('modelSelect');
        const runSelect = document.getElementById('runSelect');
        const startTimeInput = document.getElementById('startTime');

        Object.keys(defaultWeights).forEach(m => {
            const div = document.createElement('div');
            div.className = 'weight-item';
            div.innerHTML = `<span>${m.toUpperCase()}</span><input type="number" step="0.1" id="weight-${m}" value="${defaultWeights[m]}">`;
            weightsContainer.appendChild(div);
        });

        Object.keys(models).forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.textContent = models[m].name;
            modelSelect.appendChild(opt);
        });

        function updateRunOptions() {
            runSelect.innerHTML = '';
            const m = modelSelect.value;
            const freq = models[m].freq;
            let baseDate = new Date();
            baseDate.setMinutes(0, 0, 0, 0);
            
            for (let i = 0; i < 30; i++) {
                const d = new Date(baseDate.getTime() - (i * 1 * 60 * 60 * 1000));
                if (d.getUTCHours() % freq === 0) {
                    const iso = d.toISOString();
                    const label = `${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')} ${String(d.getUTCHours()).padStart(2,'0')}z`;
                    const opt = document.createElement('option');
                    opt.value = iso; opt.textContent = label;
                    runSelect.appendChild(opt);
                }
            }
        }
        modelSelect.addEventListener('change', updateRunOptions);
        updateRunOptions();

        let selectedScenarios = [];
        document.getElementById('addScenarioBtn').addEventListener('click', () => {
            const runISO = runSelect.value;
            const modelKey = modelSelect.value;
            if (selectedScenarios.some(s => s.run === runISO && s.model === modelKey)) return;
            selectedScenarios.push({ model: modelKey, run: runISO, label: runSelect.options[runSelect.selectedIndex].text });
            renderScenarios();
        });

        function renderScenarios() {
            const list = document.getElementById('scenarioList');
            list.innerHTML = '';
            selectedScenarios.forEach((s, idx) => {
                const chip = document.createElement('div');
                chip.className = 'scenario-chip';
                chip.innerHTML = `${models[s.model].name} (${s.label}) <span onclick="removeScenario(${idx})">×</span>`;
                list.appendChild(chip);
            });
        }
        window.removeScenario = (idx) => { selectedScenarios.splice(idx, 1); renderScenarios(); };

        // --- Submission ---
        document.getElementById('hocoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;

            if (!validateRequest(start, end)) return;

            const btn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');
            btn.disabled = true;
            statusBox.style.display = 'block';
            statusBox.className = 'status-box pending';
            statusBox.innerText = 'Initializing Ensemble...';

            const activeWeights = {};
            Object.keys(defaultWeights).forEach(m => { activeWeights[m] = parseFloat(document.getElementById(`weight-${m}`).value); });

            try {
                const forecastData = {
                    region: document.getElementById('regionSelect').value,
                    scenarios: userRole === 'normal' ? [] : selectedScenarios,
                    startTime: start,
                    endTime: end,
                    weather: Array.from(document.querySelectorAll('input[name="weather"]:checked')).map(cb => cb.value).join(','),
                    weights: JSON.stringify(activeWeights),
                    createdAt: new Date(),
                    userId: auth.currentUser.uid,
                    type: 'manual'
                };
                
                const docRef = await addDoc(collection(db, "hoco_requests"), { ...forecastData, status: 'pending' });
                await triggerHocoRun({ id: docRef.id, ...forecastData });
                statusBox.innerText = 'Ensemble processing in cloud...';
                statusBox.className = 'status-box completed';
            } catch (err) { 
                statusBox.innerText = 'Error: ' + err.message; 
                btn.disabled = false; 
            }
        });

        // --- Layer Loading ---
        document.getElementById('idSelector').addEventListener('change', async (e) => {
            const runId = e.target.value;
            if (!runId) return;
            const docSnap = await getDoc(doc(db, "hoco_requests", runId));
            if (docSnap.exists() && docSnap.data().geojsonUrl) {
                loadGeoJson(docSnap.data().geojsonUrl);
            }
        });

        async function loadGeoJson(url) {
            const response = await fetch(url);
            const data = await response.json();
            const processed = pointsToGrid(data);
            if (map.getLayer('hoco-grid')) map.removeLayer('hoco-grid');
            if (map.getSource('hoco-source')) map.removeSource('hoco-source');
            map.addSource('hoco-source', { type: 'geojson', data: processed });
            map.addLayer({ 
                id: 'hoco-grid', type: 'fill', source: 'hoco-source', 
                paint: { 'fill-color': ['step', ['/', ['get', 'risk'], 5], "#ffffff", 1, "#bea497", 10, "#66c2a4", 30, "#fff200", 50, "#ff7f27", 70, "#ec1c24", 85, "#b83dba"], 'fill-opacity': 0.7 }
            });
        }

        function pointsToGrid(geojson, size = 0.08) {
            const features = geojson.features.map(f => {
                const [lon, lat] = f.geometry.coordinates;
                const half = size / 2;
                return {
                    type: "Feature", properties: f.properties,
                    geometry: { type: "Polygon", coordinates: [[[lon-half, lat-half], [lon+half, lat-half], [lon+half, lat+half], [lon-half, lat+half], [lon-half, lat-half]]] }
                };
            });
            return { type: "FeatureCollection", features };
        }
    </script>
</body>
</html>
