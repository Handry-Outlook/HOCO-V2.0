<!DOCTYPE html>
<html lang="en">  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADV-HOCO Pro Forecaster</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <style>
        :root { --primary: #3498db; --bg: #0f0f0f; --card: #1e1e1e; --text: #f0f0f0; --border: #333; --accent: #2ecc71; }
        body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Sidebar Layout */
        #sidebar { width: 420px; padding: 20px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; box-shadow: 5px 0 20px rgba(0,0,0,0.7); }
        #scroll-area { flex-grow: 1; overflow-y: auto; padding-right: 10px; margin-bottom: 10px; }
        #map { flex-grow: 1; height: 100%; }

        /* Auth Screen */
        #authOverlay { position: fixed; inset: 0; background: radial-gradient(circle, #2c3e50 0%, #000 100%); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #222; padding: 40px; border-radius: 16px; width: 360px; border: 1px solid var(--primary); box-shadow: 0 0 30px rgba(52, 152, 219, 0.2); text-align: center; }

        /* Components */
        .panel { background: #151515; padding: 18px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px; }
        h2 { color: var(--primary); margin: 0 0 20px 0; font-size: 1.4rem; letter-spacing: -0.5px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; margin-bottom: 10px; color: #888; text-transform: uppercase; letter-spacing: 1.2px; }

        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 6px; border: 1px solid var(--border); background: #252525; color: #fff; font-size: 0.9rem; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2); }
        
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-add { background: var(--accent); margin-top: 5px; padding: 8px; font-size: 0.8rem; }
        #logoutBtn { background: transparent; border: 1px solid #e74c3c; color: #e74c3c; margin-top: 10px; }

        /* Scenarios Chips */
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .chip { background: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
        .chip span { cursor: pointer; font-weight: bold; font-size: 1.1rem; }

        /* Admin UI */
        #adminPanel { border-top: 2px solid var(--primary); padding-top: 20px; display: none; }
        .user-row { background: #000; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .role-btn { width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }

        /* Map Controls Overlay */
        .map-overlay { position: absolute; bottom: 30px; right: 20px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid var(--border); color: white; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h2 style="margin-bottom: 10px;">ADV-HOCO Pro</h2>
            <p style="color: #666; font-size: 0.8rem; margin-bottom: 25px;">Meteorological Ensemble Engine</p>
            <input type="email" id="emailIn" placeholder="Email Address">
            <input type="password" id="passIn" placeholder="Password">
            <button id="loginBtn">Sign In</button>
            <button id="registerBtn" style="background:#444; margin-top: 10px;">Create Access Request</button>
            <p id="authError" style="color:#e74c3c; font-size:0.8rem; margin-top:15px;"></p>
        </div>
    </div>

    <div id="sidebar">
        <div id="scroll-area">
            <div id="mainUI" style="display:none;">
                <h2>FORECASTER <span id="roleBadge" class="role-badge" style="background:var(--accent); font-size: 0.6rem; padding: 3px 8px; border-radius: 4px; vertical-align: middle;">...</span></h2>

                <div class="panel">
                    <label>Archive & Run Management</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="date" id="calendarFilter" style="margin-bottom: 0;">
                        <select id="idSelector" style="margin-bottom: 0;"><option>Loading...</option></select>
                    </div>
                </div>

                <div class="panel">
                    <label>Map Visualization</label>
                    <select id="mapStyleSelect">
                        <option value="mapbox://styles/mapbox/dark-v11">Professional Dark</option>
                        <option value="mapbox://styles/mapbox/satellite-v9">Satellite Hybrid</option>
                        <option value="mapbox://styles/mapbox/light-v11">High Contrast Light</option>
                    </select>
                    <div style="display: flex; align-items: center; gap: 15px; margin-top: 10px;">
                        <label style="margin:0;">Opacity</label>
                        <input type="range" id="opacitySlider" min="0" max="100" value="75">
                    </div>
                </div>

                <form id="hocoForm">
                    <div class="panel">
                        <label>Ensemble Parameters</label>
                        <select id="regionSelect">
                            <option value="UK">United Kingdom (Full)</option>
                            <option value="England">England (South/Central)</option>
                        </select>
                        <input type="text" id="startTime" placeholder="Start: DD/MM/YYYY HH:MM">
                        <input type="text" id="endTime" placeholder="End: DD/MM/YYYY HH:MM">
                    </div>

                    <div id="exclusiveSection" style="display:none;">
                        <div class="panel" style="border-left: 4px solid var(--primary);">
                            <label>Scenario Builder (Custom Models)</label>
                            <select id="modelSelect"></select>
                            <select id="runSelect"></select>
                            <button type="button" class="btn-add" id="addScenarioBtn">+ Add Run to Stack</button>
                            <div class="chip-container" id="scenarioList"></div>
                            
                            <label style="margin-top:20px;">Manual Weight Adjustments</label>
                            <div id="weightsContainer" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"></div>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn">Execute Ensemble Run</button>
                </form>

                <div id="adminPanel">
                    <label>Developer: User Permissions</label>
                    <div id="userList"></div>
                </div>
            </div>

            <div id="accessDenied" style="display:none; text-align: center; padding: 40px 20px;">
                <h3 style="color: var(--primary);">System Access Pending</h3>
                <p style="font-size: 0.9rem; color: #888;">Your account must be manually verified by a developer.</p>
                <label>Your Unique ID</label>
                <code id="displayUid" style="background:#000; padding:12px; display:block; border-radius:6px; font-size:0.7rem; color: var(--accent); word-break: break-all;"></code>
            </div>
        </div>
        
        <button id="logoutBtn">Terminte Session</button>
    </div>

    <div id="map"></div>
    <div class="map-overlay" id="statusOverlay">Map Engine: Ready</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8IYTApDl8vhZENPJXIw48rR_SUhfFPVQ",
            authDomain: "hoco-3b23e.firebaseapp.com",
            projectId: "hoco-3b23e",
            storageBucket: "hoco-3b23e.firebasestorage.app",
            messagingSenderId: "409513272369",
            appId: "1:409513272369:web:a857d9b039d53710f8a110"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app);
        const triggerHocoRun = httpsCallable(functions, 'triggerHocoRun');

        let userRole = 'pending';
        let selectedScenarios = [];
        const models = { 
            frahd: { name: "FRAHD", freq: 3 }, 
            rpdid2: { name: "RPDID2", freq: 3 }, 
            ukmo2km: { name: "UKMO 2KM", freq: 3},
            ez: { name: "ECMWF EZ", freq: 12 }
        };
        const defaultWeights = { 'rpdid2': 0.8, 'swisseu': 1.1, 'ez': 1.1, 'ukmo2km': 0.9, 'deuhd': 1.0 };

        // Map Setup
        mapboxgl.accessToken = 'pk.eyJ1IjoibWV0ZW9ncm91cC1tYXBib3giLCJhIjoiY2pudWJyMWVhMDQ0bjNxdXFsNWJ5M2ZtbSJ9.ANOKYyv5s0VFVbnesnGGUQ';
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [-1.5, 52.5],
            zoom: 6
        });

        // UI Listeners
        document.getElementById('mapStyleSelect').addEventListener('change', (e) => map.setStyle(e.target.value));
        document.getElementById('opacitySlider').addEventListener('input', (e) => {
            if (map.getLayer('hoco-grid')) map.setPaintProperty('hoco-grid', 'fill-opacity', e.target.value / 100);
        });

        // Auth Logic
        document.getElementById('loginBtn').addEventListener('click', async () => {
            try { await signInWithEmailAndPassword(auth, emailIn.value, passIn.value); } 
            catch (e) { document.getElementById('authError').innerText = e.message; }
        });
        document.getElementById('registerBtn').addEventListener('click', async () => {
            try { await createUserWithEmailAndPassword(auth, emailIn.value, passIn.value); } 
            catch (e) { document.getElementById('authError').innerText = e.message; }
        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('authOverlay').style.display = 'none';
                const uRef = doc(db, "users", user.uid);
                const uDoc = await getDoc(uRef);
                if (!uDoc.exists()) await setDoc(uRef, { email: user.email, role: 'pending' });
                userRole = uDoc.exists() ? uDoc.data().role : 'pending';
                setupUI(user.uid);
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
            }
        });

        function setupUI(uid) {
            const approved = userRole !== 'pending';
            document.getElementById('mainUI').style.display = approved ? 'block' : 'none';
            document.getElementById('accessDenied').style.display = approved ? 'none' : 'block';
            document.getElementById('displayUid').innerText = uid;
            
            if (approved) {
                document.getElementById('roleBadge').innerText = userRole.toUpperCase();
                document.getElementById('exclusiveSection').style.display = (userRole === 'developer' || userRole === 'exclusive') ? 'block' : 'none';
                if (userRole === 'developer') { document.getElementById('adminPanel').style.display = 'block'; loadAdminUsers(); }
                initScenarioLogic();
                loadArchive();
            }
        }

        // Scenario & Weight Initialization
        function initScenarioLogic() {
            const mSel = document.getElementById('modelSelect');
            mSel.innerHTML = '';
            Object.keys(models).forEach(k => {
                const o = document.createElement('option'); o.value = k; o.textContent = models[k].name; mSel.appendChild(o);
            });
            updateRunTimes();
            mSel.onchange = updateRunTimes;

            const wCont = document.getElementById('weightsContainer');
            wCont.innerHTML = '';
            Object.keys(defaultWeights).forEach(m => {
                const d = document.createElement('div');
                d.innerHTML = `<span style="color:#666; font-size:10px">${m.toUpperCase()}</span><input type="number" step="0.1" id="w-${m}" value="${defaultWeights[m]}" style="margin:0; padding:5px;">`;
                wCont.appendChild(d);
            });
        }

        function updateRunTimes() {
            const rSel = document.getElementById('runSelect'); rSel.innerHTML = '';
            const freq = models[document.getElementById('modelSelect').value].freq;
            let now = new Date(); now.setMinutes(0,0,0);
            for(let i=0; i<30; i++) {
                let d = new Date(now - (i * 3600000));
                if(d.getUTCHours() % freq === 0) {
                    let opt = document.createElement('option');
                    opt.value = d.toISOString();
                    opt.textContent = `${d.getUTCDate()}/${d.getUTCMonth()+1} ${d.getUTCHours()}z`;
                    rSel.appendChild(opt);
                }
            }
        }

        document.getElementById('addScenarioBtn').onclick = () => {
            const m = document.getElementById('modelSelect').value;
            const r = document.getElementById('runSelect').value;
            const label = document.getElementById('runSelect').options[document.getElementById('runSelect').selectedIndex].text;
            selectedScenarios.push({ model: m, run: r, label: `${models[m].name} (${label})` });
            renderChips();
        };

        function renderChips() {
            const cont = document.getElementById('scenarioList'); cont.innerHTML = '';
            selectedScenarios.forEach((s, i) => {
                const c = document.createElement('div'); c.className = 'chip';
                c.innerHTML = `${s.label} <span onclick="removeScenario(${i})">×</span>`;
                cont.appendChild(c);
            });
        }
        window.removeScenario = (i) => { selectedScenarios.splice(i, 1); renderChips(); };

        // Admin User Management
        function loadAdminUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('userList'); list.innerHTML = '';
                snap.forEach(d => {
                    const u = d.data();
                    const row = document.createElement('div'); row.className = 'user-row';
                    row.innerHTML = `<div>${u.email}<br><small style="color:var(--primary)">${u.role}</small></div>
                        <div style="display:flex; gap:4px;">
                            <button class="role-btn" onclick="setRole('${d.id}','normal')">N</button>
                            <button class="role-btn" style="background:#f39c12" onclick="setRole('${d.id}','exclusive')">E</button>
                            <button class="role-btn" style="background:#e74c3c" onclick="setRole('${d.id}','developer')">D</button>
                        </div>`;
                    list.appendChild(row);
                });
            });
        }
        window.setRole = (uid, role) => updateDoc(doc(db, "users", uid), { role });

        // Archive Loader
        let allRuns = [];
        function loadArchive() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('calendarFilter').value = today;
            onSnapshot(query(collection(db, "hoco_requests"), orderBy("createdAt", "desc"), limit(100)), (snap) => {
                allRuns = []; snap.forEach(d => allRuns.push({id: d.id, ...d.data()}));
                filterRuns();
            });
        }
        document.getElementById('calendarFilter').onchange = filterRuns;
        function filterRuns() {
            const date = document.getElementById('calendarFilter').value;
            const filtered = allRuns.filter(r => r.createdAt?.toDate().toISOString().split('T')[0] === date);
            const sel = document.getElementById('idSelector'); sel.innerHTML = '<option value="">Select Run</option>';
            filtered.forEach(r => {
                const o = document.createElement('option'); o.value = r.id; o.textContent = `[${r.status}] ${r.startTime}`; sel.appendChild(o);
            });
        }

        // Trigger Run
        document.getElementById('hocoForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true;
            const weights = {}; Object.keys(defaultWeights).forEach(m => weights[m] = parseFloat(document.getElementById(`w-${m}`).value));
            
            const payload = {
                region: document.getElementById('regionSelect').value,
                startTime: document.getElementById('startTime').value,
                endTime: document.getElementById('endTime').value,
                scenarios: selectedScenarios,
                weights: JSON.stringify(weights),
                userId: auth.currentUser.uid,
                createdAt: new Date(),
                status: 'pending'
            };

            try {
                const docRef = await addDoc(collection(db, "hoco_requests"), payload);
                await triggerHocoRun({ id: docRef.id, ...payload });
                document.getElementById('statusOverlay').innerText = "Status: Transmitted to Cloud";
            } catch (err) { alert(err.message); }
            btn.disabled = false;
        };

        // Map Visualization
        document.getElementById('idSelector').onchange = async (e) => {
            const id = e.target.value; if(!id) return;
            const d = await getDoc(doc(db, "hoco_requests", id));
            if(d.exists() && d.data().geojsonUrl) {
                const geo = await (await fetch(d.data().geojsonUrl)).json();
                if (map.getLayer('hoco-grid')) map.removeLayer('hoco-grid');
                if (map.getSource('hoco-source')) map.removeSource('hoco-source');
                map.addSource('hoco-source', { type: 'geojson', data: geo });
                map.addLayer({
                    id: 'hoco-grid', type: 'fill', source: 'hoco-source',
                    paint: {
                        'fill-color': ['interpolate', ['linear'], ['get', 'risk'], 0, '#fff', 50, '#f1c40f', 100, '#e74c3c'],
                        'fill-opacity': document.getElementById('opacitySlider').value / 100
                    }
                });
            }
        };
    </script>
</body>
</html>
