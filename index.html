<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TKT4GTFBNM"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-TKT4GTFBNM');
    </script>
    <style>
        #map {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .leaflet-popup-content-wrapper {
            background-color: rgba(255, 255, 225, 0.8);
            border-radius: 5px;
            font: Arial, sans-serif;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script>

        //Initialise the map centered on London
        var map;
        let markerClusterGroup;
        var canvasRenderer = L.canvas({ padding: 0.5 });
        let allPoints = []; // Store all points for dynamic marker management

        window.onload = function () {
            map = L.map('map').setView([51.5074, -0.1278], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);


            map.options.preferCanvas = true; // Enable canvas rendering for better performance with many markers

            //Create cluster group for markers
            markerClusterGroup = L.markerClusterGroup({
                spiderfyOnMaxZoom: true,
                showCoverageOnHover: false,
                disableClusteringAtZoom: 1,
                zoomToBoundsOnClick: true,
                chunkedLoading: true,
            }
            );
            map.addLayer(markerClusterGroup);
            map.on('zoomend', updateVisibleMarkers); // Update markers when zoom level changes
            setTimeout(function () {
                map.invalidateSize();
            }, 400);
        };

        function addMarkersBatch(points) {
            allPoints = points;
            updateVisibleMarkers();
        }

        function updateVisibleMarkers() {
            if (!markerClusterGroup) return; // Ensure markerClusterGroup is initialized
            markerClusterGroup.clearLayers(); // Clear existing markers
            const zoom = map.getZoom();

            if (zoom >= 1) {
                const markersToBatch = []
                // Add all markers if zoom level is 13 or higher
                allPoints.forEach(p => {
                    const marker = L.circleMarker([p.lat, p.lon], {
                        renderer: canvasRenderer,
                        radius: 5,
                        fillColor: p.col,
                        color: '#000',
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).bindPopup('<b>Pollutant:</b> ' + p.pol + '<br><b>Value:</b> ' + p.val + ' ' + p.unit);
                    markersToBatch.push(marker);
                });
                markerClusterGroup.addLayers(markersToBatch);

            }
        }

        //Function to clear all markers from the map
        function clearMarkers() {

            if (markerClusterGroup) {
                markerClusterGroup.clearLayers();
                allPoints = []; // Clear stored points as well
            }
        }

        function invalidateSize() {
            setTimeout(function () {
                map.invalidateSize();
            }, 400);
        }
    </script>
</body>

</html>
