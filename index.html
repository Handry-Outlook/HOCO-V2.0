<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADV-HOCO Pro Forecaster</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <style>
        :root {
            --primary: #3498db;
            --bg: #0f0f0f;
            --card: #1e1e1e;
            --text: #f0f0f0;
            --border: #333;
            --accent: #2ecc71;
            --danger: #e74c3c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* Sidebar Layout */
        #sidebar {
            width: 420px;
            padding: 20px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 5px 0 20px rgba(0, 0, 0, 0.7);
        }

        #scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 10px;
        }

        #map {
            flex-grow: 1;
            height: 100%;
        }

        /* Auth Screen */
        #authOverlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #2c3e50 0%, #000 100%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: #222;
            padding: 40px;
            border-radius: 16px;
            width: 360px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.2);
            text-align: center;
        }

        /* Components */
        .panel {
            background: #151515;
            padding: 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        h2 {
            color: var(--primary);
            margin: 0 0 20px 0;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #252525;
            color: #fff;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }

        button:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-add {
            background: var(--accent);
            margin-top: 5px;
            padding: 8px;
            font-size: 0.8rem;
        }

        #logoutBtn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            margin-top: 10px;
        }

        /* Scenarios Chips */
        .chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .chip {
            background: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chip span {
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Admin UI */
        #adminPanel {
            border-top: 2px solid var(--primary);
            padding-top: 20px;
            display: none;
        }

        .user-row {
            background: #000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222;
        }

        .role-btn {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Map Controls Overlay */
        .map-overlay {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            color: white;
            font-size: 0.8rem;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h2 style="margin-bottom: 10px;">ADV-HOCO Pro</h2>
            <p style="color: #666; font-size: 0.8rem; margin-bottom: 25px;">Meteorological Ensemble Engine</p>
            <input type="email" id="emailIn" placeholder="Email Address" required>
            <input type="password" id="passIn" placeholder="Password" required>
            <button id="loginBtn">Sign In</button>
            <button id="registerBtn" style="background:#444; margin-top: 10px;">Create Access Request</button>
            <p id="authError" style="color:#e74c3c; font-size:0.8rem; margin-top:15px;"></p>
        </div>
    </div>

    <div id="sidebar">
        <div id="scroll-area">
            <div id="mainUI" style="display:none;">
                <h2>FORECASTER <span id="roleBadge"
                        style="background:var(--accent); font-size: 0.6rem; padding: 3px 8px; border-radius: 4px; vertical-align: middle;">...</span>
                </h2>

                <div class="panel">
                    <label>Archive & Run Management</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="date" id="calendarFilter" style="margin-bottom: 0;">
                        <select id="idSelector" style="margin-bottom: 0;">
                            <option value="">Select Run...</option>
                        </select>
                    </div>
                </div>

                <div class="panel">
                    <label>Map Visualization</label>
                    <select id="mapStyleSelect">
                        <option value="mapbox://styles/mapbox/dark-v11">Professional Dark</option>
                        <option value="mapbox://styles/mapbox/satellite-v9">Satellite Hybrid</option>
                        <option value="mapbox://styles/mapbox/light-v11">High Contrast Light</option>
                    </select>
                    <div style="display: flex; align-items: center; gap: 15px; margin-top: 10px;">
                        <label style="margin:0;">Opacity</label>
                        <input type="range" id="opacitySlider" min="0" max="100" value="75">
                    </div>
                </div>

                <form id="hocoForm">
                    <div class="panel">
                        <label>Ensemble Parameters</label>
                        <select id="regionSelect">
                            <option value="UK">United Kingdom (Full)</option>
                            <option value="England">England (South/Central)</option>
                        </select>
                        <input type="text" id="startTime" placeholder="Start: DD/MM/YYYY HH:MM" required>
                        <input type="text" id="endTime" placeholder="End: DD/MM/YYYY HH:MM" required>
                    </div>

                    <div id="exclusiveSection" style="display:none;">
                        <div class="panel" style="border-left: 4px solid var(--primary);">
                            <label>Scenario Builder (Custom Models)</label>
                            <select id="modelSelect"></select>
                            <select id="runSelect"></select>
                            <button type="button" class="btn-add" id="addScenarioBtn">+ Add Run to Stack</button>
                            <div class="chip-container" id="scenarioList"></div>

                            <label style="margin-top:20px;">Manual Weight Adjustments</label>
                            <div id="weightsContainer" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn">Execute Ensemble Run</button>
                </form>

                <div id="adminPanel">
                    <label>Developer: User Permissions</label>
                    <div id="userList"></div>
                </div>
            </div>

            <div id="accessDenied" style="display:none; text-align: center; padding: 40px 20px;">
                <h3 style="color: var(--primary);">System Access Pending</h3>
                <p style="font-size: 0.9rem; color: #888;">Your account must be manually verified by a developer.</p>
                <label>Your Unique ID</label>
                <code id="displayUid"
                    style="background:#000; padding:12px; display:block; border-radius:6px; font-size:0.7rem; color: var(--accent); word-break: break-all;"></code>
            </div>
        </div>

        <button id="logoutBtn">Terminate Session</button>
    </div>

    <div id="map"></div>
    <div class="map-overlay" id="statusOverlay">Map Engine: Ready</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        // ==========================================
        // 1. FIREBASE INITIALIZATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyA8IYTApDl8vhZENPJXIw48rR_SUhfFPVQ",
            authDomain: "hoco-3b23e.firebaseapp.com",
            projectId: "hoco-3b23e",
            storageBucket: "hoco-3b23e.firebasestorage.app",
            messagingSenderId: "409513272369",
            appId: "1:409513272369:web:a857d9b039d53710f8a110"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app, "us-central1");
        const triggerHocoRun = httpsCallable(functions, 'triggerHocoRun');

        // ==========================================
        // 2. GLOBAL STATE
        // ==========================================
        let userRole = 'pending';
        let selectedScenarios = [];
        let allRuns = [];

        const models = {
            swisseu: { name: "SWISS-EU", freq: 3 },
            harmi: { name: "HARMONIE", freq: 3 },
            swissnow: { name: "SWISS-NOW", freq: 1 },
            ez: { name: "ECMWF EZ", freq: 12 },
            ukmo2km: { name: "UKMO 2KM", freq: 3 },
            rpdid2: { name: "RPDID2", freq: 3 }
        };
        const defaultWeights = { 'rpdid2': 0.8, 'swisseu': 1.1, 'ez': 1.1, 'ukmo2km': 0.9, 'deuhd': 1.0 };

        // ==========================================
        // 3. MAPBOX CONFIGURATION
        // ==========================================
        mapboxgl.accessToken = 'pk.eyJ1IjoibWV0ZW9ncm91cC1tYXBib3giLCJhIjoiY2pudWJyMWVhMDQ0bjNxdXFsNWJ5M2ZtbSJ9.ANOKYyv5s0VFVbnesnGGUQ';
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [-1.5, 52.5],
            zoom: 6
        });

        // Inspector Popup Logic
        map.on('click', 'hoco-grid', (e) => {
            const props = e.features[0].properties;

            // Divide risk by 5
            const risk = (props.risk || props.Risk || 0) / 5;

            const popup = new mapboxgl.Popup()
                .setLngLat(e.lngLat)
                .setHTML(`<strong>Ensemble Data</strong><br>Risk Index: ${risk}<br>Lat: ${e.lngLat.lat.toFixed(2)} Lon: ${e.lngLat.lng.toFixed(2)}`)
                .addTo(map);

            // Accessibility Fix: Remove aria-hidden from the focused close button
            const closeBtn = popup.getElement().querySelector('.mapboxgl-popup-close-button');
            if (closeBtn) {
                closeBtn.removeAttribute('aria-hidden');
            }
        });

        // Cursor Updates
        map.on('mouseenter', 'hoco-grid', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'hoco-grid', () => map.getCanvas().style.cursor = '');

        // Map Control UI Listeners
        document.getElementById('mapStyleSelect').addEventListener('change', (e) => {
            map.setStyle(e.target.value);
        });

        document.getElementById('opacitySlider').addEventListener('input', (e) => {
            if (map.getLayer('hoco-grid')) {
                map.setPaintProperty('hoco-grid', 'fill-opacity', e.target.value / 100);
            }
        });

        // ==========================================
        // 4. AUTHENTICATION LOGIC
        // ==========================================
        const emailIn = document.getElementById('emailIn');
        const passIn = document.getElementById('passIn');
        const authError = document.getElementById('authError');

        document.getElementById('loginBtn').addEventListener('click', async (e) => {
            e.target.disabled = true;
            try {
                await signInWithEmailAndPassword(auth, emailIn.value, passIn.value);
                authError.innerText = '';
            } catch (err) {
                authError.innerText = err.message;
            } finally {
                e.target.disabled = false;
            }
        });

        document.getElementById('registerBtn').addEventListener('click', async (e) => {
            e.target.disabled = true;
            try {
                await createUserWithEmailAndPassword(auth, emailIn.value, passIn.value);
                authError.innerText = '';
            } catch (err) {
                authError.innerText = err.message;
            } finally {
                e.target.disabled = false;
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('authOverlay').style.display = 'none';
                const uRef = doc(db, "users", user.uid);

                try {
                    const uDoc = await getDoc(uRef);
                    if (!uDoc.exists()) {
                        await setDoc(uRef, { email: user.email, role: 'pending' });
                        userRole = 'pending';
                    } else {
                        userRole = uDoc.data().role;
                    }
                    setupUI(user.uid);
                } catch (err) {
                    console.error("Error fetching user role: ", err);
                }
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
                document.getElementById('mainUI').style.display = 'none';
                document.getElementById('accessDenied').style.display = 'none';
            }
        });

        // ==========================================
        // 5. USER INTERFACE SETUP
        // ==========================================
        function setupUI(uid) {
            const isApproved = userRole !== 'pending';
            document.getElementById('mainUI').style.display = isApproved ? 'block' : 'none';
            document.getElementById('accessDenied').style.display = isApproved ? 'none' : 'block';
            document.getElementById('displayUid').innerText = uid;

            if (isApproved) {
                document.getElementById('roleBadge').innerText = userRole.toUpperCase();

                const showExclusive = (userRole === 'developer' || userRole === 'exclusive');
                document.getElementById('exclusiveSection').style.display = showExclusive ? 'block' : 'none';

                if (userRole === 'developer') {
                    document.getElementById('adminPanel').style.display = 'block';
                    loadAdminUsers();
                }

                initScenarioLogic();
                loadArchive();
            }
        }

        // ==========================================
        // 6. GEOJSON CONVERSION UTILITY
        // ==========================================
        function pointsToGrid(geojson, size = 0.08) {
            if (!geojson || !geojson.features) return geojson;

            const features = geojson.features.map(f => {
                const [lon, lat] = f.geometry.coordinates;
                const half = size / 2;
                return {
                    type: "Feature",
                    properties: f.properties,
                    geometry: {
                        type: "Polygon",
                        coordinates: [[
                            [lon - half, lat - half],
                            [lon + half, lat - half],
                            [lon + half, lat + half],
                            [lon - half, lat + half],
                            [lon - half, lat - half]
                        ]]
                    }
                };
            });
            return { type: "FeatureCollection", features };
        }
        function parseStartTime(timeStr) {
            if (!timeStr) return new Date(); // Fallback to current system time
            
            // Attempt to parse DD/MM/YYYY HH:MM
            const match = timeStr.match(/^(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})$/);
            if (match) {
                const [_, day, month, year, hours, minutes] = match;
                // Meteorological runs are typically UTC (zulu) time
                return new Date(Date.UTC(year, month - 1, day, hours, minutes, 0));
            }
            
            // Fallback if they typed a standard date string instead
            const parsed = new Date(timeStr);
            return isNaN(parsed.getTime()) ? new Date() : parsed;
        }
        // ==========================================
        // 7. SCENARIO BUILDER LOGIC
        // ==========================================
        function initScenarioLogic() {
            const mSel = document.getElementById('modelSelect');
            mSel.innerHTML = '';

            Object.keys(models).forEach(k => {
                const option = document.createElement('option');
                option.value = k;
                option.textContent = models[k].name;
                mSel.appendChild(option);
            });

            updateRunTimes();
            mSel.addEventListener('change', updateRunTimes);
            document.getElementById('startTime').addEventListener('blur', updateRunTimes);
            document.getElementById('startTime').addEventListener('keyup', updateRunTimes);
            // Setup Default Weights
            const wCont = document.getElementById('weightsContainer');
            wCont.innerHTML = '';
            Object.keys(defaultWeights).forEach(m => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <span style="color:#666; font-size:10px">${m.toUpperCase()}</span>
                    <input type="number" step="0.1" id="w-${m}" value="${defaultWeights[m]}" style="margin:0; padding:5px;">
                `;
                wCont.appendChild(div);
            });
        }

        function updateRunTimes() {
            const rSel = document.getElementById('runSelect');
            rSel.innerHTML = '';

            const modelVal = document.getElementById('modelSelect').value;
            const freq = models[modelVal].freq;

            // Get time from input or default to now
            const startTimeInput = document.getElementById('startTime').value;
            let baseTime = parseStartTime(startTimeInput);

            // Round down the base time to the nearest valid run hour for the selected model
            baseTime.setUTCMinutes(0, 0, 0);
            let currentHour = baseTime.getUTCHours();
            let roundedHour = Math.floor(currentHour / freq) * freq;
            baseTime.setUTCHours(roundedHour);

            // Generate exactly 30 past runs based on the model's specific frequency
            for (let i = 0; i < 30; i++) {
                // Subtract (iteration * frequency) hours from baseTime
                let d = new Date(baseTime.getTime() - (i * freq * 3600000));

                let opt = document.createElement('option');
                opt.value = d.toISOString();

                // Format for display: DD/MM HHz
                const dd = String(d.getUTCDate()).padStart(2, '0');
                const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
                const hh = String(d.getUTCHours()).padStart(2, '0');

                opt.textContent = `${dd}/${mm} ${hh}z`;
                rSel.appendChild(opt);
            }
        }

        document.getElementById('addScenarioBtn').addEventListener('click', () => {
            const m = document.getElementById('modelSelect').value;
            const rSel = document.getElementById('runSelect');
            const r = rSel.value;
            const label = rSel.options[rSel.selectedIndex].text;

            selectedScenarios.push({
                model: m,
                run: r,
                label: `${models[m].name} (${label})`
            });
            renderChips();
        });

        function renderChips() {
            const cont = document.getElementById('scenarioList');
            cont.innerHTML = '';

            selectedScenarios.forEach((s, i) => {
                const c = document.createElement('div');
                c.className = 'chip';
                c.innerHTML = `${s.label} <span onclick="removeScenario(${i})">×</span>`;
                cont.appendChild(c);
            });
        }

        // Global function required for chip inline onclick
        window.removeScenario = (i) => {
            selectedScenarios.splice(i, 1);
            renderChips();
        };

        // ==========================================
        // 8. ADMIN / DEVELOPER LOGIC
        // ==========================================
        function loadAdminUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('userList');
                list.innerHTML = '';

                snap.forEach(d => {
                    const u = d.data();
                    const row = document.createElement('div');
                    row.className = 'user-row';
                    row.innerHTML = `
                        <div>
                            ${u.email}<br>
                            <small style="color:var(--primary)">${u.role}</small>
                        </div>
                        <div style="display:flex; gap:4px;">
                            <button class="role-btn" style="background:#444" onclick="setRole('${d.id}','normal')">N</button>
                            <button class="role-btn" style="background:#f39c12" onclick="setRole('${d.id}','exclusive')">E</button>
                            <button class="role-btn" style="background:#e74c3c" onclick="setRole('${d.id}','developer')">D</button>
                        </div>
                    `;
                    list.appendChild(row);
                });
            });
        }

        // Global function required for admin buttons inline onclick
        window.setRole = async (uid, role) => {
            try {
                await updateDoc(doc(db, "users", uid), { role });
            } catch (err) {
                console.error("Failed to update role:", err);
            }
        };

        // ==========================================
        // 9. ARCHIVE & RUN MANAGEMENT
        // ==========================================
        function loadArchive() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('calendarFilter').value = today;

            const q = query(collection(db, "hoco_requests"), orderBy("createdAt", "desc"), limit(100));
            onSnapshot(q, (snap) => {
                allRuns = [];
                snap.forEach(d => allRuns.push({ id: d.id, ...d.data() }));
                filterRuns();
            });
        }

        document.getElementById('calendarFilter').addEventListener('change', filterRuns);

        function filterRuns() {
            const dateStr = document.getElementById('calendarFilter').value;
            const filtered = allRuns.filter(r => {
                if (!r.createdAt) return false;
                const rDate = r.createdAt.toDate ? r.createdAt.toDate() : new Date(r.createdAt);
                return rDate.toISOString().split('T')[0] === dateStr;
            });

            const sel = document.getElementById('idSelector');
            sel.innerHTML = '<option value="">Select Run</option>';

            filtered.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.id;
                opt.textContent = `[${(r.status || 'unknown').toUpperCase()}] ${r.startTime}`;
                sel.appendChild(opt);
            });
        }

        // ==========================================
        // 10. EXECUTE RUN LOGIC
        // ==========================================
        document.getElementById('hocoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            // Collect Weights
            const weights = {};
            Object.keys(defaultWeights).forEach(m => {
                const el = document.getElementById(`w-${m}`);
                weights[m] = el ? parseFloat(el.value) : defaultWeights[m];
            });

            const payload = {
                region: document.getElementById('regionSelect').value,
                startTime: document.getElementById('startTime').value,
                endTime: document.getElementById('endTime').value,
                scenarios: selectedScenarios,
                weights: JSON.stringify(weights),
                userId: auth.currentUser.uid,
                createdAt: new Date(),
                status: 'pending'
            };

            try {
                const docRef = await addDoc(collection(db, "hoco_requests"), payload);
                document.getElementById('statusOverlay').innerText = "Status: Executing Request...";

                await triggerHocoRun({ id: docRef.id, ...payload });
                document.getElementById('statusOverlay').innerText = "Status: Run triggered successfully.";
            } catch (err) {
                alert("Execution failed: " + err.message);
                document.getElementById('statusOverlay').innerText = "Status: Failed";
            } finally {
                btn.disabled = false;
            }
        });

        // ==========================================
        // 11. MAP DATA VISUALIZATION
        // ==========================================
        document.getElementById('idSelector').addEventListener('change', async (e) => {
            const id = e.target.value;
            if (!id) return;

            document.getElementById('statusOverlay').innerText = "Status: Fetching run metadata...";

            try {
                const docSnap = await getDoc(doc(db, "hoco_requests", id));
                if (docSnap.exists() && docSnap.data().geojsonUrl) {

                    document.getElementById('statusOverlay').innerText = "Status: Loading GeoJSON...";
                    const response = await fetch(docSnap.data().geojsonUrl);

                    if (!response.ok) throw new Error("Network response was not ok");

                    const rawData = await response.json();
                    const gridData = pointsToGrid(rawData); // Convert points to squares

                    // Clean existing layer/source
                    if (map.getLayer('hoco-grid')) map.removeLayer('hoco-grid');
                    if (map.getSource('hoco-source')) map.removeSource('hoco-source');

                    // Add new layer/source
                    map.addSource('hoco-source', { type: 'geojson', data: gridData });
                    map.addLayer({
                        id: 'hoco-grid',
                        type: 'fill',
                        source: 'hoco-source',
                        paint: {
                            'fill-color': [
                                'interpolate', ['linear'],
                                ['/', ['coalesce', ['get', 'risk'], ['get', 'Risk'], 0], 5],
                                0, '#ffffff',
                                20, '#66c2a4',
                                40, '#fff200',
                                60, '#ff7f27',
                                80, '#ec1c24',
                                100, '#b83dba'
                            ],
                            'fill-opacity': document.getElementById('opacitySlider').value / 100
                        }
                    });

                    document.getElementById('statusOverlay').innerText = "Status: Data Rendered Successfully";
                } else {
                    document.getElementById('statusOverlay').innerText = "Status: No GeoJSON URL found for this run.";
                }
            } catch (error) {
                console.error("Map rendering error:", error);
                document.getElementById('statusOverlay').innerText = "Status: Error loading Map Data";
            }
        });

    </script>
</body>

</html>
