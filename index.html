<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADV-HOCO Multi-Model Forecaster</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #1a1a1a; color: #eee; }
        #sidebar { width: 420px; padding: 20px; background: #252525; border-right: 1px solid #444; overflow-y: auto; z-index: 10; box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5); }
        #map { flex-grow: 1; height: 100%; }
        
        /* UI Components */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 6px; color: #bbb; }
        input, select { width: 100%; padding: 10px; border: 1px solid #444; border-radius: 4px; background: #333; color: white; box-sizing: border-box; }
        
        .control-panel { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #444; margin-top: 15px; }
        
        /* Legend Styles */
        .legend-container { margin-top: 15px; }
        .legend-bar { 
            height: 12px; 
            width: 100%; 
            background: linear-gradient(to right, #66c2a4, #fff200, #ff7f27, #ec1c24, #b83dba); 
            border-radius: 6px;
            margin-bottom: 5px;
        }
        .legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #888; }

        #scenarioSection { display: none; margin-top: 15px; }
        .scenario-builder { background: #1e1e1e; padding: 12px; border-radius: 6px; border: 1px solid #3498db; margin-bottom: 15px; }
        .scenario-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        .scenario-chip { background: #3498db; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.75em; display: flex; align-items: center; }
        .scenario-chip span { margin-left: 8px; cursor: pointer; font-weight: bold; }
        
        .weight-grid { max-height: 120px; overflow-y: auto; border: 1px solid #444; padding: 8px; background: #1a1a1a; margin-bottom: 15px; }
        .weight-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 0.75em; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .weight-item input { width: 60px; padding: 4px; text-align: center; height: 25px; }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .checkbox-item { display: flex; align-items: center; font-size: 0.8em; background: #333; padding: 6px 12px; border-radius: 20px; border: 1px solid #444; }
        .checkbox-item input { width: auto; margin-right: 8px; }
        
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-add { background: #27ae60; margin-top: 8px; padding: 8px; }
        button:hover { filter: brightness(1.2); }
        
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }
        .status-box { margin-top: 20px; padding: 12px; border-radius: 4px; font-size: 0.85em; display: none; text-align: center; }
        .pending { background: #f39c12; color: #fff; }
        .completed { background: #27ae60; color: #fff; }
        
        #idSelector option {
            background: #252525;
            color: white;
            padding: 8px;
        }

    </style>
</head>

<body>

    <div id="sidebar">
        <h2 style="margin-top:0; color: #3498db;">ADV-HOCO Multi-Run</h2>
        
        <div class="control-panel">
            <div class="form-group">
                <label>Base Map Style</label>
                <select id="mapStyleSelect">
                    <option value="mapbox://styles/mapbox/dark-v11">Dark Matter</option>
                    <option value="mapbox://styles/mapbox/satellite-v9">Satellite</option>
                    <option value="mapbox://styles/mapbox/light-v11">Light</option>
                    <option value="mapbox://styles/mapbox/outdoors-v12">Outdoors</option>
                    <option value="mapbox://styles/mapbox/navigation-night-v1">Navigation Night</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>HOCO Layer Opacity: <span id="opacityVal">70%</span></label>
                <input type="range" id="opacitySlider" min="0" max="100" value="70">
            </div>

            <div class="legend-container">
                <label>Risk Intensity Scale</label>
                <div class="legend-bar"></div>
                <div class="legend-labels">
                    <span>LOW</span>
                    <span>MOD</span>
                    <span>HIGH</span>
                    <span>EXTREME</span>
                </div>
            </div>
        </div>

        <hr>

        <form id="hocoForm">
            <div class="form-group">
                <label>1. Forecast Period & Region</label>
                <select id="regionSelect" style="margin-bottom: 8px;">
                    <option value="England">England</option>
                    <option value="UK">United Kingdom</option>
                    <option value="Wales">Wales</option>
                    <option value="Scotland">Scotland</option>
                </select>
                <input type="text" id="startTime" placeholder="Start: DD/MM/YYYY HH:MM" required>
            </div>
            <div class="form-group">
                <input type="text" id="endTime" placeholder="End: DD/MM/YYYY HH:MM" required>
            </div>

            <div id="scenarioSection">
                <div class="scenario-builder">
                    <label>2. Select Model Runs (UTC/Z)</label>
                    <select id="modelSelect" style="margin-bottom: 5px;"></select>
                    <select id="runSelect"></select>
                    <button type="button" class="btn-add" id="addScenarioBtn">+ Add Run to Request</button>
                    <div class="scenario-list" id="scenarioList"></div>
                </div>

                <label>3. Model Weights</label>
                <div id="weightsContainer" class="weight-grid"></div>

                <label>4. Parameters</label>
                <div class="checkbox-group">
                    <div class="checkbox-item"><input type="checkbox" name="weather" value="lightning" checked> Lightning</div>
                    <div class="checkbox-item"><input type="checkbox" name="weather" value="tornado"> Tornado</div>
                    <div class="checkbox-item"><input type="checkbox" name="weather" value="supercell"> Supercell</div>
                    <div class="checkbox-item"><input type="checkbox" name="weather" value="snow"> Snow</div>
                </div>

                <button type="submit" id="submitBtn">Generate Combined Forecast</button>
            </div>
        </form>
        
        <div id="statusBox" class="status-box"></div>
        <hr>
        <select id="idSelector"><option value="">-- Load Past Runs --</option></select>
    </div>

    <div id="map"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8IYTApDl8vhZENPJXIw48rR_SUhfFPVQ",
            authDomain: "hoco-3b23e.firebaseapp.com",
            projectId: "hoco-3b23e",
            storageBucket: "hoco-3b23e.firebasestorage.app",
            messagingSenderId: "409513272369",
            appId: "1:409513272369:web:a857d9b039d53710f8a110",
            measurementId: "G-NRPS6JHYN7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const functions = getFunctions(app, "us-central1");
        const triggerHocoRun = httpsCallable(functions, 'triggerHocoRun');

        const lightning_colors = ["#ffffff", "#d0cece", "#d0cece", "#d0cece", "#d0cece", "#bea497", "#bea497", "#bea497", "#bea497", "#bea497", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#66c2a4", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#fff200", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ff7f27", "#ec1c24", "#ec1c24", "#ec1c24", "#ec1c24", "#ec1c24", "#ec1c24", "#ec1c24", "#ec1c24", "#ec1c24", "#ec1c24", "#ec1c24", "#ec1c24", "#ec1c24", "#ec1c24", "#ec1c24", "#b83dba", "#b83dba", "#b83dba", "#b83dba", "#b83dba", "#b83dba", "#b83dba", "#b83dba", "#b83dba", "#b83dba", "#b83dba", "#b83dba", "#b83dba", "#b83dba", "#b83dba"];

        const defaultWeights = { 'rpdid2': 0.8, 'swisseu': 1.1, 'ez': 1.1, 'swissnow': 0.9, 'frahd': 0.8, 'hardmi': 1.0, 'ukmo2km': 0.9, 'deuhd': 1.0 };
        const models = { frahd: { name: "FRAHD", freq: 3 }, rpdid2: { name: "RPDID2", freq: 3 }, hardmi: { name: "HARDMI", freq: 3 }, swisseu: { name: "SWISSEU", freq: 3 }, swissnow: { name: "SWISSNOW", freq: 1 }, ez: { name: "EZ", freq: 12 }, ukmo2km: { name: "UKMO 2KM", freq: 3} };

        mapboxgl.accessToken = 'pk.eyJ1IjoibWV0ZW9ncm91cC1tYXBib3giLCJhIjoiY2pudWJyMWVhMDQ0bjNxdXFsNWJ5M2ZtbSJ9.ANOKYyv5s0VFVbnesnGGUQ';
        const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [-1.5, 52.5], zoom: 5.5 });

        // --- LAYER CONTROLS ---
        document.getElementById('opacitySlider').addEventListener('input', (e) => {
            const val = e.target.value / 100;
            document.getElementById('opacityVal').innerText = `${e.target.value}%`;
            if (map.getLayer('hoco-grid')) map.setPaintProperty('hoco-grid', 'fill-opacity', val);
        });

        document.getElementById('mapStyleSelect').addEventListener('change', (e) => {
            const currentSource = map.getSource('hoco-source');
            const currentData = currentSource ? currentSource._data : null;
            
            map.setStyle(e.target.value);
            
            // Re-add layer after style load
            map.once('style.load', () => {
                if (currentData) {
                    map.addSource('hoco-source', { type: 'geojson', data: currentData });
                    addHocoLayer();
                }
            });
        });

        function addHocoLayer() {
            let colorExp = ['step', ['/', ['get', 'risk'], 5]];
            lightning_colors.forEach((c, i) => { 
                colorExp.push(c); 
                if (i < lightning_colors.length - 1) colorExp.push(i + 1); 
            });

            const currentOpacity = document.getElementById('opacitySlider').value / 100;

            map.addLayer({ 
                id: 'hoco-grid', 
                type: 'fill', 
                source: 'hoco-source', 
                paint: { 'fill-color': colorExp, 'fill-opacity': currentOpacity }
            });
        }

        // --- GRID PROCESSOR & LOADER ---
        function pointsToGrid(geojson, size = 0.08) {
            const features = geojson.features.map(f => {
                const [lon, lat] = f.geometry.coordinates;
                const half = size / 2;
                return {
                    type: "Feature", properties: f.properties,
                    geometry: { type: "Polygon", coordinates: [[[lon-half, lat-half], [lon+half, lat-half], [lon+half, lat+half], [lon-half, lat+half], [lon-half, lat-half]]] }
                };
            });
            return { type: "FeatureCollection", features };
        }

        async function loadGeoJson(url) {
            if (!map.loaded()) return;
            try {
                const response = await fetch(url);
                const rawData = await response.json();
                const processedData = pointsToGrid(rawData);
                if (map.getLayer('hoco-grid')) map.removeLayer('hoco-grid');
                if (map.getSource('hoco-source')) map.removeSource('hoco-source');
                
                map.addSource('hoco-source', { type: 'geojson', data: processedData });
                addHocoLayer();
            } catch (err) { console.error("Loader Error:", err); }
        }

        // --- FORM & RECOMMENDATION LOGIC ---
        const weightsContainer = document.getElementById('weightsContainer');
        const modelSelect = document.getElementById('modelSelect');
        const runSelect = document.getElementById('runSelect');
        const startTimeInput = document.getElementById('startTime');
        const scenarioSection = document.getElementById('scenarioSection');

        Object.keys(defaultWeights).forEach(m => {
            const div = document.createElement('div');
            div.className = 'weight-item';
            div.innerHTML = `<span>${m.toUpperCase()}</span><input type="number" step="0.1" id="weight-${m}" value="${defaultWeights[m]}">`;
            weightsContainer.appendChild(div);
        });

        Object.keys(models).forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.textContent = models[m].name;
            modelSelect.appendChild(opt);
        });

        function updateRunOptions() {
            runSelect.innerHTML = '';
            const m = modelSelect.value;
            const freq = models[m].freq;
            let baseDate = new Date();
            const userDateStr = startTimeInput.value;
            
            if (userDateStr) {
                const parts = userDateStr.match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/);
                if (parts) {
                    const userDate = new Date(parts[3], parts[2] - 1, parts[1], parts[4], parts[5]);
                    if (!isNaN(userDate) && userDate < new Date()) baseDate = userDate;
                }
            }
            baseDate.setMinutes(0, 0, 0, 0);
            
            for (let i = 0; i < 40; i++) {
                const d = new Date(baseDate.getTime() - (i * 1 * 60 * 60 * 1000));
                if (d.getUTCHours() % freq === 0) {
                    const isoUTC = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}T${String(d.getUTCHours()).padStart(2,'0')}:00:00Z`;
                    const label = `${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')} ${String(d.getUTCHours()).padStart(2,'0')}z`;
                    const opt = document.createElement('option');
                    opt.value = isoUTC; opt.textContent = label;
                    runSelect.appendChild(opt);
                }
                if (runSelect.childElementCount >= 30) break;
            }
        }

        startTimeInput.addEventListener('blur', () => { if (startTimeInput.value.length >= 10) { scenarioSection.style.display = 'block'; updateRunOptions(); } });
        modelSelect.addEventListener('change', updateRunOptions);

        let selectedScenarios = [];
        document.getElementById('addScenarioBtn').addEventListener('click', () => {
            const runISO = runSelect.value;
            const modelKey = modelSelect.value;
            if (selectedScenarios.some(s => s.run === runISO && s.model === modelKey)) return;
            selectedScenarios.push({ model: modelKey, run: runISO, label: runSelect.options[runSelect.selectedIndex].text });
            renderScenarios();
        });

        function renderScenarios() {
            const list = document.getElementById('scenarioList');
            list.innerHTML = '';
            selectedScenarios.forEach((s, idx) => {
                const chip = document.createElement('div');
                chip.className = 'scenario-chip';
                chip.innerHTML = `${models[s.model].name} (${s.label}) <span onclick="removeScenario(${idx})">×</span>`;
                list.appendChild(chip);
            });
        }
        window.removeScenario = (idx) => { selectedScenarios.splice(idx, 1); renderScenarios(); };

        document.getElementById('hocoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');
            btn.disabled = true;
            statusBox.style.display = 'block';
            statusBox.className = 'status-box pending';
            statusBox.innerText = 'Triggering Ensemble...';

            const activeWeights = {};
            Object.keys(defaultWeights).forEach(m => { activeWeights[m] = parseFloat(document.getElementById(`weight-${m}`).value); });

            try {
                const forecastData = {
                    region: document.getElementById('regionSelect').value,
                    scenarios: selectedScenarios,
                    startTime: document.getElementById('startTime').value,
                    endTime: document.getElementById('endTime').value,
                    weather: Array.from(document.querySelectorAll('input[name="weather"]:checked')).map(cb => cb.value).join(','),
                    weights: JSON.stringify(activeWeights),
                    createdAt: new Date()
                };
                const docRef = await addDoc(collection(db, "hoco_requests"), { ...forecastData, status: 'pending' });
                const result = await triggerHocoRun({ id: docRef.id, ...forecastData });
                if (result.data?.success) { statusBox.innerText = 'Success! Blending started.'; statusBox.className = 'status-box completed'; }
                else { throw new Error("Trigger failed."); }
            } catch (err) { statusBox.innerText = 'Error: ' + err.message; btn.disabled = false; }
        });

        onSnapshot(query(collection(db, "hoco_requests"), orderBy("createdAt", "desc"), limit(15)), (snap) => {
            const s = document.getElementById('idSelector');
            s.innerHTML = '<option value="">-- Recent Runs --</option>';
            
            snap.forEach(d => {
                const data = d.data();
                const opt = document.createElement('option');
                opt.value = d.id;
                
                // Determine label and icon
                const icon = data.type === 'automated' ? '🤖' : '👤';
                const scenarioInfo = data.scenarios?.length > 0 
                    ? `${data.scenarios.length} runs` 
                    : 'Auto-Models';
                
                opt.textContent = `${icon} [${data.status.toUpperCase()}] ${data.region} - ${scenarioInfo} (${data.startTime})`;
                
                // Color coding for status in the list
                if (data.status === 'completed') opt.style.color = '#27ae60';
                if (data.status === 'pending') opt.style.color = '#f39c12';
                
                s.appendChild(opt);
            });
        });

        document.getElementById('idSelector').addEventListener('change', async (e) => {
            const runId = e.target.value;
            if (!runId) return;

            const statusBox = document.getElementById('statusBox');
            statusBox.style.display = 'block';
            statusBox.className = 'status-box pending';
            statusBox.innerText = 'Loading Layer...';

            const docSnap = await getDoc(doc(db, "hoco_requests", runId));
            
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.geojsonUrl) {
                    loadGeoJson(data.geojsonUrl);
                    statusBox.className = 'status-box completed';
                    statusBox.innerText = `Displaying: ${data.type === 'automated' ? 'Standard Product' : 'Custom Run'}`;
                } else if (data.status === 'pending') {
                    statusBox.innerText = 'Run is still processing in GitHub...';
                } else {
                    statusBox.innerText = 'Error: No GeoJSON URL found.';
                }
            }
        });
    </script>
</body>
</html>
